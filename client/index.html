<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notion Clone</title>
    <script>
      // Pre-paint theme: read saved preference (or system fallback) and apply
      // the matching class to <html> BEFORE React renders. This prevents the
      // initial dark/light flash on hard reloads. The runtime hook keeps it
      // in sync with the authenticated user's preference afterwards.
      (function () {
        try {
          var pref = localStorage.getItem('themePref') || 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.toggle('light', !dark);
          root.classList.toggle('dark', dark);
          root.style.colorScheme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
